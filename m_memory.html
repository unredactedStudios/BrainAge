<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>BRAIN TRAINING: Web Edition</title>
  <!-- Default favicon: animated GIF -->
  <link rel="icon" type="image/gif" href="assets/favicon.gif">

  <style>
    :root {
      --ds-bg: #bfbfbf;
      --panel: #ffffff;
      --panel-border: #cfcfcf;
      --ink: #000000;
    }

    @font-face {
      font-family: "DSSystem";
      src: url("assets/SYSTEM.otf") format("opentype");
      font-weight: normal;
      font-style: normal;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: "DSSystem", sans-serif;
      background: #bdbdbd;
    }

    .wrap {
      position: fixed;
      inset: 0;
      background: linear-gradient(#cfcfcf, #bdbdbd);
    }

    .screens {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .screen {
      position: relative;
      background: var(--ds-bg);
      box-shadow: inset 0 0 0 4px #a9a9a9;
      /* thinner outer */
    }

    /* Inner bezel (thinner) */
    .bezel {
      position: absolute;
      left: 22px;
      right: 22px;
      top: 14px;
      bottom: 14px;
      background: linear-gradient(#cfcfcf, #bdbdbd);
      border: 4px solid #ff0000;
      /* thinner */
      box-shadow:
        inset 0 0 0 4px #dedede,
        inset 0 0 0 6px #f9f9f9;
    }

    /* White content */
    .content {
      position: absolute;
      left: 38px;
      right: 38px;
      top: 36px;
      bottom: 36px;
      background: var(--panel);
      border: 4px solid var(--panel-border);
      /* thinner */
      box-shadow: inset 0 0 0 2px #fdfdfd;
      padding: 0;
      box-sizing: border-box;
    }

    /* --- Fix: header overflow (2-line question) --- */
    .header {
      position: absolute;
      left: 12px;
      right: 12px;
      top: 12px;

      /* was 90px -> too small for 2 lines */
      height: 140px;

      background: #f3f3f3;
      border: 4px solid #bfbfbf;
      box-shadow: inset 0 0 0 2px #ffffff;

      padding: 18px 18px;
      /* a bit more breathing room */
      box-sizing: border-box;

      color: var(--ink);
      font-size: 40px;
      line-height: 1.05;

      white-space: pre-line;
      overflow: hidden;
      /* just in case */
    }

    /* main must start below the taller header */
    .main {
      position: absolute;
      left: 12px;
      right: 12px;
      top: 168px;
      bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Right screen has no header, so fill space */
    .screen:last-child .main {
      top: 12px;
    }

    /* PHOTO FRAME (unchanged size, thinner border) */
    .photoFrame {
      width: 92%;
      height: 78%;
      max-width: 760px;
      max-height: 520px;
      background: #fafafa;
      border: 8px solid #e5e5e5;
      /* thinner */
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .photoFrame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gotItImg {
      cursor: pointer;
      image-rendering: pixelated;
      user-select: none;
      width: 320px;
      /* adjust this size */
      height: auto;
    }

    /* Options layout unchanged size */
    .optionsWrap {
      width: 92%;
      height: 78%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .optionsGrid {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(3, minmax(120px, 1fr));
      gap: 14px;
    }

    /* Thinner thumbnail borders */
    .thumb {
      position: relative;
      background: #fafafa;
      border: 8px solid #e5e5e5;
      /* thinner */
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.12);
      cursor: pointer;
      overflow: hidden;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumbKey {
      position: absolute;
      left: 6px;
      top: 6px;
      font-size: 14px;
      /* smaller number */
      padding: 1px 4px;
      /* tighter box */
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #d7d7d7;
      /* thinner border */
    }

    /* Toast smaller */
    #toast {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 64px;
      background: rgba(255, 255, 255, 0.96);
      border: 4px solid #d7d7d7;
      padding: 14px 28px;
      box-shadow: 0 10px 0 rgba(0, 0, 0, 0.12);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 3000;
    }

    /* Countdown unchanged */
    #countdown {
      position: fixed;
      inset: 0;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 4000;
    }

    #countImg {
      height: 200px;
      image-rendering: pixelated;
    }

    #fade {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 1;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 3500;
    }

    #game {
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .resultOverlay {
      z-index: 5;
    }

    .thumbKey {
      z-index: 6;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- Sounds (same set as Reading Aloud) -->
    <audio id="waitSound" src="assets/wait.ogg"></audio>
    <audio id="goSound" src="assets/go.ogg"></audio>
    <audio id="pageForward" src="assets/SUCCESS.ogg"></audio>
    <audio id="pageBack" src="assets/FAIL.ogg"></audio>
    <audio id="finishSound" src="assets/FINISH.ogg"></audio>

    <div id="countdown">
      <img id="countImg" src="assets/3.webp" alt="">
    </div>

    <div id="fade"></div>
    <div id="toast"></div>

    <div id="game" class="screens">
      <!-- LEFT SCREEN -->
      <div class="screen">
        <div class="content">
          <div id="leftHeader" class="header">Memorise the photo.</div>
          <div class="main">
            <div class="photoFrame">
              <img id="bigPhoto" alt="">
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT SCREEN -->
      <div class="screen">
        <div class="content">
          <div class="main" id="rightMain"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* -------------------------------------------------------
       Photo Memory (Brain Age DS-ish)
       Uses assets/MEMORY1.webp ... assets/MEMORY13.webp
    
       Rounds:
         4 photos, 4 photos, 6 photos, 6 photos, repeat...
       The game continues until the player has correctly remembered
       EACH image at least once (i.e., answered correctly when that
       image was the "previous photo").
    -------------------------------------------------------- */
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function playSfx(audioEl) {
      if (!audioEl) return;
      audioEl.pause();
      audioEl.currentTime = 0;
      audioEl.play().catch(() => { });
    }

    const waitSound = document.getElementById("waitSound");
    const goSound = document.getElementById("goSound");
    const pageForward = document.getElementById("pageForward");
    const pageBack = document.getElementById("pageBack");
    const finishSound = document.getElementById("finishSound");

    const leftHeader = document.getElementById("leftHeader");
    const rightMain = document.getElementById("rightMain");
    const bigPhoto = document.getElementById("bigPhoto");

    const countImg = document.getElementById("countImg");
    const countdown = document.getElementById("countdown");
    const fade = document.getElementById("fade");
    const game = document.getElementById("game");

    /* Photos */
    const photos = Array.from({ length: 13 }, (_, i) => ({
      id: i,
      name: `MEMORY${i + 1}`,
      src: `assets/MEMORY${i + 1}.webp`
    }));

    /*
      Exactly 10 questions total.
      Each number is how many answer choices should be shown for that question.
    */
    const questionPattern = [2, 2, 4, 4, 6, 6, 6, 6, 6, 6];

    let questionIndex = 0;
    let stage = "memorise";   // "memorise" | "question" | "finish"
    let inputBlocked = false;

    let prevPhotoIdx = -1;
    let currentPhotoIdx = -1;
    let activeOptions = [];

    /* ---------------- UI helpers ---------------- */

    function setBigPhotoByIndex(idx) {
      bigPhoto.src = photos[idx].src;
      bigPhoto.alt = photos[idx].name;
    }

    function clearRight() {
      rightMain.innerHTML = "";
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickDifferentPhotoIdx(exceptIdx) {
      let idx = Math.floor(Math.random() * photos.length);
      if (photos.length > 1) {
        while (idx === exceptIdx) {
          idx = Math.floor(Math.random() * photos.length);
        }
      }
      return idx;
    }

    function makeOptionSet(correctIdx, count) {
      const pool = Array.from({ length: photos.length }, (_, i) => i).filter(i => i !== correctIdx);
      const shuffled = shuffle(pool);
      const neededDistractors = Math.max(0, count - 1);

      const arr = [correctIdx, ...shuffled.slice(0, neededDistractors)];
      return shuffle(arr);
    }

    function createOptionsGrid(optionIdxs) {
      clearRight();

      const wrap = document.createElement("div");
      wrap.className = "optionsWrap";

      const grid = document.createElement("div");
      grid.className = "optionsGrid";

      for (let i = 0; i < 6; i++) {
        const tile = document.createElement("div");
        tile.className = "thumb";

        if (i >= optionIdxs.length) {
          tile.style.visibility = "hidden";
          grid.appendChild(tile);
          continue;
        }

        const idx = optionIdxs[i];
        tile.dataset.idx = String(idx);

        const img = document.createElement("img");
        img.src = photos[idx].src;
        img.alt = photos[idx].name;

        const key = document.createElement("div");
        key.className = "thumbKey";
        key.textContent = String(i + 1);

        tile.appendChild(img);
        tile.appendChild(key);

        tile.addEventListener("click", () => {
          if (inputBlocked) return;
          handlePick(idx);
        });

        grid.appendChild(tile);
      }

      wrap.appendChild(grid);
      rightMain.appendChild(wrap);
    }

    /* ---------------- Game flow ---------------- */

    function renderStartMemorise() {
      stage = "memorise";
      inputBlocked = false;

      leftHeader.textContent = "Memorise the photo.";

      prevPhotoIdx = Math.floor(Math.random() * photos.length);
      setBigPhotoByIndex(prevPhotoIdx);

      clearRight();

      const img = document.createElement("img");
      img.src = "assets/GOTIT.webp";
      img.className = "gotItImg";
      img.alt = "Got It";

      img.addEventListener("mousedown", () => {
        img.src = "assets/GOTIT_PRESSED.webp";
      });

      img.addEventListener("mouseup", () => {
        img.src = "assets/GOTIT.webp";
      });

      img.addEventListener("mouseleave", () => {
        img.src = "assets/GOTIT.webp";
      });

      img.addEventListener("click", () => {
        if (inputBlocked) return;
        startQuestion();
      });

      rightMain.appendChild(img);
    }

    function startQuestion() {
      if (questionIndex >= questionPattern.length) {
        finish();
        return;
      }

      stage = "question";
      inputBlocked = false;

      leftHeader.textContent = "Which was the\nprevious photo?";


      currentPhotoIdx = pickDifferentPhotoIdx(prevPhotoIdx);
      setBigPhotoByIndex(currentPhotoIdx);

      const optionCount = questionPattern[questionIndex];
      activeOptions = makeOptionSet(prevPhotoIdx, optionCount);

      createOptionsGrid(activeOptions);
    }

    function showNextMemorisePhoto() {
      stage = "memorise";
      inputBlocked = true;

      prevPhotoIdx = currentPhotoIdx;
      setBigPhotoByIndex(prevPhotoIdx);
    }

    /* ---------------- Pick handling ---------------- */

    function handlePick(pickedIdx) {
      inputBlocked = true;

      const ok = (pickedIdx === prevPhotoIdx);

      if (ok) {
        playSfx(pageForward);
      } else {
        playSfx(pageBack);
      }

      const tiles = rightMain.querySelectorAll(".thumb");

      tiles.forEach(tile => {
        const idx = parseInt(tile.dataset.idx || "-1", 10);

        if (idx < 0) return;

        if (idx !== pickedIdx) {
          tile.style.visibility = "hidden";
          return;
        }

        tile.style.visibility = "visible";

        const old = tile.querySelector(".resultOverlay");
        if (old) old.remove();

        const overlay = document.createElement("img");
        overlay.className = "resultOverlay";
        overlay.src = ok ? "assets/CORRECT.webp" : "assets/WRONG.webp";

        overlay.style.position = "absolute";
        overlay.style.left = "50%";
        overlay.style.top = "50%";
        overlay.style.transform = "translate(-50%, -50%)";
        overlay.style.width = "100%";
        overlay.style.pointerEvents = "none";

        tile.appendChild(overlay);
      });

      setTimeout(() => {
        questionIndex++;

        // After the 10th click, end immediately
        if (questionIndex >= questionPattern.length) {
          finish();
          return;
        }

        showNextMemorisePhoto();

        setTimeout(() => {
          startQuestion();
        }, 650);

      }, 600);
    }

    /* ---------------- Finish ---------------- */

    function finish() {
      stage = "finish";
      inputBlocked = true;

      playSfx(finishSound);

      leftHeader.textContent = "";

      clearRight();

      let exited = false;

      const doExit = () => {
        if (exited) return;
        exited = true;

        fade.style.transition = "opacity 0.5s ease";
        fade.style.opacity = "1";

        setTimeout(() => {
          window.location.href = "training.html";
        }, 500);
      };

      finishSound.addEventListener("ended", doExit, { once: true });
      setTimeout(doExit, Math.max(1000, (finishSound.duration || 0) * 1000 + 150));
    }

    /* ---------------- Keyboard ---------------- */

    document.addEventListener("keydown", (e) => {
      if (inputBlocked) return;
      if (stage !== "question") return;

      const n = parseInt(e.key, 10);
      if (!Number.isFinite(n)) return;

      const idx = n - 1;
      if (idx < 0 || idx >= activeOptions.length) return;

      e.preventDefault();
      handlePick(activeOptions[idx]);
    }, { passive: false });

    /* ---------------- Countdown ---------------- */

    async function playCountdown() {
      const sequence = ["3.webp", "2.webp", "1.webp"];

      for (const img of sequence) {
        countImg.src = "assets/" + img;
        playSfx(waitSound);
        await sleep(1000);
      }

      playSfx(goSound);
      countdown.style.display = "none";

      renderStartMemorise();

      requestAnimationFrame(() => {
        fade.style.opacity = "0";
        game.style.opacity = "1";
      });
    }

    window.onload = playCountdown;
  </script>
</body>

</html>
