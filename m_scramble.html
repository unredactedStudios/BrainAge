<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Word Scramble</title>
<style>
  :root{
    --ds-bg:#bfbfbf;
    --panel:#ffffff;
    --panel-border:#cfcfcf;
  }

  html,body{
    margin:0;
    height:100%;
    background:#bdbdbd;
    font-family:"Times New Roman", Times, serif;
    overflow:hidden;
  }

  /* FULLSCREEN LAYOUT */
  .wrap{
    height:100%;
    width:100%;
  }

  .ds{
    width:100vw;
    height:100vh;
    background:linear-gradient(#cfcfcf,#bdbdbd);
    position:relative;
  }

  .screens{
    position:absolute;
    inset:0;
    display:grid;
    grid-template-columns: 1fr 1fr;
  }

  .screen{
    position:relative;
    background:var(--ds-bg);
    border-left:3px solid #888;
  }

  .screen:first-child{
    border-left:none;
    border-right:3px solid #888;
  }

  .panel{
    position:absolute;
    left:6%;
    right:6%;
    top:4%;      /* was 8% */
    bottom:10%;  /* was 20% */
    background:var(--panel);
    border:6px solid var(--panel-border);
    box-shadow: inset 0 0 0 2px #e8e8e8;
  }

  .lettersArea{
    position:absolute;
    inset:0;
    overflow:hidden;
  }

  .letter{
    position:absolute;
    left:50%;
    top:44%;
    font-size:2.6vw;
    color:#111;
    user-select:none;
    /* Important: we animate around center, but keep letters upright */
    transform: translate(-50%,-50%);
    will-change: transform;
  }

  .slots{
    position:absolute;
    left:10%;
    right:10%;
    bottom:6%;
    height:22%;
    background:#f7f7f7;
    border:4px solid #c9c9c9;
    display:grid;
    place-items:center;
  }

  .slots .underscores{
    font-size:3vw;
    letter-spacing:10px;
  }

  .passBtn{
    position:absolute;
    top:4%;
    right:6%;
    width:12%;
    cursor:pointer;
    user-select:none;
    image-rendering:pixelated;
  }

  .writeArea{
    position:absolute;
    left:6%;
    right:6%;
    top:18%;
    bottom:28%;
    background:#fff;
    border:6px solid #cfcfcf;
    display:grid;
    place-items:center;
    overflow:hidden;
  }

  .typed{
    font-size:5vw;
    letter-spacing:8px;
  }

  .eraseBtn{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:8%;
    height:10%;
    width:auto;              /* keep natural image width */
    cursor:pointer;
    user-select:none;
    image-rendering:pixelated;
  }

  .resultOverlay{
    position:absolute;
    inset:0;
    display:none;
    place-items:center;
  }

  .resultOverlay img{
    max-width:60%;
    image-rendering:pixelated;
  }

  .resultOverlay.show{
    display:grid;
  }

  .level{
    position:absolute;
    left:6%;
    top:4%;
    font-size:1.2vw;
  }

  .hint{
    position:absolute;
    left:0;
    right:0;
    bottom:6px;
    text-align:center;
    font-size:1vw;
    opacity:.6;
  }

  .passOverlay{
  position:absolute;
  inset:0;
  display:none;
  pointer-events:none;
  z-index:15;
}

.passOverlay.show{ display:block; }

.passOverlay img{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
  width:70%;            /* was 100% */
  height:auto;
  image-rendering:pixelated;
}

/* Smaller answer text */
.passAnswer{
  position:absolute;
  left:50%;
  top:50%;              /* adjust vertical placement */
  transform:translateX(-50%);
  width:70%;            /* match image width */
  text-align:center;
  font-size:3vw;      /* was 4vw */
  letter-spacing:6px;   /* was 10px */
  color:#111;
  text-shadow: 0 2px 0 rgba(255,255,255,.8);
}

#fadeWhite{
  position:fixed;
  inset:0;
  background:#fff;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.5s linear;
  z-index:9999;
}

#fadeWhite.show{
  opacity:1;
}

/* Countdown overlay */
#countdown{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

#countImg{
  height:200px;
  image-rendering:pixelated;
}

/* Intro fade overlay */
#fadeIntro{
  position:fixed;
  inset:0;
  background:#fff;
  opacity:1;
  pointer-events:none;
  transition:opacity 0.4s ease;
  z-index:1500;
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="ds" id="ds">
      <div class="screens">
        <!-- LEFT SCREEN -->
        <div class="screen">
          <div class="panel">
          <div class="lettersArea" id="lettersArea"></div>

          <div class="passOverlay" id="passOverlay">
            <img id="passImg" alt="Scramble Answer" src="assets/SCRAMBLE_ANSWER.webp" />
            <div class="passAnswer" id="passAnswerText"></div>
          </div>
            <div class="slots">
                          <div class="resultOverlay" id="resultOverlay">
              <img id="resultImg" alt="Result" src="" />
            </div>
              <div class="underscores" id="underscores">____</div>
            </div>
          </div>
        </div>

        <!-- RIGHT SCREEN -->
        <div class="screen">
          <img
            src="assets/PASS.webp"
            id="passBtn"
            class="passBtn"
            alt="Pass"
            draggable="false"
          />
          <div class="level" id="levelText"></div>
          <div class="writeArea" id="writeArea">
            <div class="typed" id="typed"> </div>
          </div>

          <img
            src="assets/ERASE.webp"
            id="eraseBtn"
            class="eraseBtn"
            alt="Erase"
            draggable="false"
          />
        </div>
      </div>

      <div id="countdown">
  <img id="countImg" src="assets/3.webp" alt="Countdown">
</div>

<div id="fadeIntro"></div>

    </div>
  </div>

<script>
/**
 * Word list is here (progressively harder: mostly increasing length).
 * Add/remove words freely.
 */
const WORDS = [
  "PLAN",
  "FABLE",
  "GRAVE",
  "SHOPS",
  "CAREER",
  "WOODEN",
  "LEAGUE",
  "SEVENTY",
  "KNOCKOUT"
];

const els = {
  
  lettersArea: document.getElementById("lettersArea"),
  underscores: document.getElementById("underscores"),
  typed: document.getElementById("typed"),
  eraseBtn: document.getElementById("eraseBtn"),
  passBtn: document.getElementById("passBtn"),
  overlay: document.getElementById("resultOverlay"),
  resultImg: document.getElementById("resultImg"),
  writeArea: document.getElementById("writeArea"),
  levelText: document.getElementById("levelText"),
  ds: document.getElementById("ds"),
  passOverlay: document.getElementById("passOverlay"),
  passAnswerText: document.getElementById("passAnswerText")
};

const countdown = document.getElementById("countdown");
const countImg = document.getElementById("countImg");
const fadeIntro = document.getElementById("fadeIntro");

const sounds = {
  success: new Audio("assets/success.ogg"),
  fail: new Audio("assets/fail.ogg"),
  pass: new Audio("assets/PASS.ogg"),
  erase: new Audio("assets/ERASE.ogg"),
  finish: new Audio("assets/FINISH.ogg"),
  wait: new Audio("assets/wait.ogg"),
  go: new Audio("assets/go.ogg")
};

sounds.success.preload = "auto";
sounds.fail.preload = "auto";
sounds.pass.preload = "auto";
sounds.erase.preload = "auto";

let index = 0;
let answer = "";
let locked = true; // start locked for countdown
let orbitState = { raf: null, running: false };
let gameDone = false;

async function playCountdown(){
  // Block input during intro
  locked = true;

  const sequence = ["3.webp","2.webp","1.webp"];

  for(const img of sequence){
    countImg.src = "assets/" + img;
    playSound("wait");
    await sleep(1000);
  }

  playSound("go");
  countdown.style.display = "none";

  // Start the actual game now (this starts orbit too)
  loadWord(0);

  requestAnimationFrame(() => {
    fadeIntro.style.opacity = "0";
    // optionally remove after fade
    setTimeout(() => fadeIntro.style.display = "none", 450);
  });
}

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

function waitAudioEnd(a){
  if(!a) return Promise.resolve();
  return new Promise(res => a.addEventListener("ended", res, { once:true }));
}

async function finishSequence(){
  if(gameDone) return;
  gameDone = true;
  locked = true;

  // freeze orbit in-place
  stopOrbit();

  // play finish sound (overlap-capable)
  const fin = playSound("finish");

  // start fade to white (0.5s)
  const fadeWhite = document.getElementById("fadeWhite");
  fadeWhite.classList.add("show");

  // wait: at least the fade duration, AND until audio ends (if we got it)
  const fadeMin = sleep(500);
  const audioDone = fin
    ? new Promise(res => fin.addEventListener("ended", res, { once:true }))
    : sleep(500);

  await Promise.all([fadeMin, audioDone]);

  // redirect
  window.location.href = "training.html";
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function positionsFor(n){
  // Relative positions (percent). Looks like scattered letters.
  // If more letters, we reuse and jitter slightly.
  const base = [
    {x:22,y:20},{x:60,y:18},{x:78,y:42},{x:30,y:58},{x:58,y:62},
    {x:18,y:42},{x:75,y:22},{x:40,y:30},{x:50,y:48},{x:32,y:78},
    {x:68,y:78},{x:18,y:70},{x:82,y:66}
  ];
  const out = [];
  for(let i=0;i<n;i++){
    const b = base[i % base.length];
    const jitter = (i >= base.length) ? 6 : 2;
    out.push({
      x: b.x + (Math.random()*jitter - jitter/2),
      y: b.y + (Math.random()*jitter - jitter/2)
    });
  }
  return out;
}

function setUnderscores(len){
  // Store length so we can render filled slots
  els.underscores.dataset.len = String(len);
  renderSlots();
}

function renderSlots(){
  const len = Number(els.underscores.dataset.len || "0");
  const slots = [];
  for(let i=0;i<len;i++){
    slots.push(answer[i] ? answer[i] : "_");
  }
  els.underscores.textContent = slots.join(" ");
}

function setTypedText(){
  // RIGHT SIDE: only show the last typed letter (or blank)
  const last = answer.length ? answer[answer.length - 1] : " ";
  els.typed.textContent = last;

  // LEFT SIDE: fill the slot line(s)
  renderSlots();
}

function clearOverlay(){
  els.overlay.classList.remove("show");
  els.resultImg.src = "";
}

function showOverlay(type){
  // Images are inside /assets/
  els.resultImg.src = (type === "correct")
    ? "assets/CORRECT.webp"
    : "assets/WRONG.webp";

  els.overlay.classList.add("show");
}

function canTypeLetter(ch){
  const target = WORDS[index].toUpperCase();

  // Count how many times ch appears in target
  let allowed = 0;
  for (const c of target) if (c === ch) allowed++;

  // Count how many times ch is already used in current answer
  let used = 0;
  for (const c of answer) if (c === ch) used++;

  return used < allowed;
}

function stopOrbit(){
  orbitState.running = false;
  if(orbitState.raf) cancelAnimationFrame(orbitState.raf);
  orbitState.raf = null;
}

function renderLetters(word){
  // stop any previous orbit loop
  stopOrbit();

  els.lettersArea.innerHTML = "";
  const letters = shuffle(word.split(""));
  const n = letters.length;

  const radius = 140;  // px
  const speed  = 0.9;  // radians/sec

  const nodes = letters.map((ch, i) => {
    const div = document.createElement("div");
    div.className = "letter";
    div.textContent = ch;
    els.lettersArea.appendChild(div);

    return { div, angleOffset: (i / n) * Math.PI * 2 };
  });

  let start = performance.now();
  orbitState.running = true;

  function tick(now){
    if(!orbitState.running) return;

    const t = (now - start) / 1000;
    const baseAngle = t * speed;

    const verticalOffset = -60; // keep your "move letters up" setting here

    for(const node of nodes){
      const a = baseAngle + node.angleOffset;
      const x = Math.cos(a) * radius;
      const y = Math.sin(a) * radius;

      node.div.style.transform =
        `translate(-50%,-50%) translate(${x}px, ${y + verticalOffset}px)`;
    }

    orbitState.raf = requestAnimationFrame(tick);
  }

  orbitState.raf = requestAnimationFrame(tick);
}

function loadWord(i){
  index = i;
  answer = "";
  locked = false;
  clearOverlay();
  els.passBtn.src = "assets/PASS.webp";
  els.passOverlay.classList.remove("show");

  const word = WORDS[index].toUpperCase();
  renderLetters(word);
  setUnderscores(word.length);
  setTypedText();
  els.levelText.textContent = ``;
}

function checkAnswer(){
  if(locked) return;
  const target = WORDS[index].toUpperCase();
  if(answer.length !== target.length) return;

  locked = true;

  if(answer === target){
    showOverlay("correct");
    const sfx = playSound("success");

    if(index < WORDS.length - 1){
      // normal: keep your old timing
      setTimeout(() => {
        clearOverlay();
        loadWord(index + 1);
      }, 800);
    } else {
      // FINAL WORD: wait for success sound to finish, then finishSequence
      waitAudioEnd(sfx).then(() => {
        clearOverlay();
        finishSequence();
      });
    }
  } else {
    // WRONG
    showOverlay("wrong");
    playSound("fail");
    els.writeArea.classList.add("shake");

    setTimeout(() => {
      els.writeArea.classList.remove("shake");
      clearOverlay();

      // Clear typed letters after failure
      answer = "";
      setTypedText();     // updates right side
      renderSlots();      // updates left slots

      locked = false;
    }, 650);
      }
    }

function erase(){
  if(gameDone) return;
  if(locked) return;
  answer = "";
  setTypedText();
}

async function pass(){
  if(gameDone) return;
  if(locked) return;
  locked = true;

  const isLast = (index >= WORDS.length - 1);

  // play pass sound
  const passSfx = playSound("pass");

  // show WRONG sprite (pass counts as incorrect)
  showOverlay("wrong");

  // freeze letters
  stopOrbit();

  // show SCRAMBLE overlay + answer text for 1s
  const target = WORDS[index].toUpperCase();
  els.passAnswerText.textContent = target.split("").join(" ");
  els.passOverlay.classList.add("show");

  // wait for the reveal duration AND the pass sound to finish
  await Promise.all([
    sleep(1000),
    waitAudioEnd(passSfx)
  ]);

  // hide overlays after both are done
  els.passOverlay.classList.remove("show");
  clearOverlay();

  if(!isLast){
    loadWord(index + 1);
  } else {
    finishSequence();
  }
}

function playSound(key){
  const src = sounds[key]?.src;
  if(!src) return null;

  const a = new Audio(src); // new instance => overlapping allowed
  a.preload = "auto";
  a.play();
  return a;
}

document.addEventListener("keydown", (e) => {
  if(gameDone) return;
  if(locked) return;

  const target = WORDS[index].toUpperCase();

  // allow letters only
  if(e.key.length === 1 && /[a-zA-Z]/.test(e.key)){
  const ch = e.key.toUpperCase();
  const target = WORDS[index].toUpperCase();

  // Only allow letters that exist somewhere in the word
  if(!target.includes(ch)) return;

  if(answer.length < target.length){
    answer += ch;
    setTypedText();
    checkAnswer();
  }

  return;
}

  if(e.key === "Backspace"){
    // only play if there IS text
    if(answer.length > 0){
      playSound("erase");
      answer = answer.slice(0, -1);
      setTypedText();
    }
    return;
  }

  if(e.key === "Escape"){
    // ALWAYS play, even if empty
    playSound("erase");
    erase();
    return;
  }

  if(e.key === "Enter"){
    // early submit only if full length (keeps it simple)
    checkAnswer();
    return;
  }
});

els.eraseBtn.addEventListener("click", () => {
  playSound("erase");
  erase();
});
els.passBtn.addEventListener("click", pass);
els.passBtn.addEventListener("mousedown", () => {
  els.passBtn.src = "assets/PASS_PRESSED.webp";
});
// Start
window.onload = playCountdown;
</script>
<div id="fadeWhite"></div>
</body>
</html>
