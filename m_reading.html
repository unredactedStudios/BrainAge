<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>BRAIN TRAINING: Web Edition</title>
  <!-- Default favicon: animated GIF -->
  <link rel="icon" type="image/gif" href="assets/favicon.gif">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: "Times New Roman", Times, serif;
    }

    /* Split layout */
    #game {
      position: fixed;
      inset: 0;
      display: flex;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .column {
      flex: 1;
      padding: 80px 60px;
      box-sizing: border-box;
      font-size: 28px;
      line-height: 1.6;
    }

    /* Buttons */
    .navBtn {
      position: fixed;
      top: 15px;
      height: 50px;
      width: auto;
      cursor: pointer;
      image-rendering: pixelated;
      z-index: 1000;
    }

    #nextBtn {
      right: 15px;
    }

    #backBtn {
      left: 15px;
      display: none;
    }

    /* Countdown overlay */
    #countdown {
      position: fixed;
      inset: 0;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    #countImg {
      height: 200px;
      image-rendering: pixelated;
    }

    /* Fade overlay */
    #fade {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 1;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 1500;
    }
  </style>
</head>

<body>

  <audio id="waitSound" src="assets/wait.ogg"></audio>
  <audio id="goSound" src="assets/go.ogg"></audio>
  <audio id="pageForward" src="assets/PAGE_FORWARD.ogg"></audio>
  <audio id="pageBack" src="assets/PAGE_BACK.ogg"></audio>

  <!-- ✅ finish sound -->
  <audio id="finishSound" src="assets/FINISH.ogg"></audio>

  <div id="countdown">
    <img id="countImg" src="assets/3.webp">
  </div>

  <div id="fade"></div>

  <img id="backBtn" class="navBtn" src="assets/BACK_READING.webp" alt="">
  <img id="nextBtn" class="navBtn" src="assets/NEXT_READING.webp" alt="">

  <div id="game">
    <div class="column" id="leftText"></div>
    <div class="column" id="rightText"></div>
  </div>

  <script>
    /* ---------------- BOOK DATA ---------------- */

    const books = [

      {
        title: "Pride and Prejudice — Jane Austen",
        pages: [

          `<p>It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife.</p>

<p>However little known the feelings or views of such a man may be on his first entering a neighbourhood, this truth is so firmly fixed in the minds of the surrounding families that he is considered the rightful property of someone or other of their daughters.</p>

<p>"My dear Mr. Bennet," said his lady to him one day, "have you heard that Netherfield Park is let at last?"</p>

<p>Mr. Bennet replied that he had not.</p>

<p>"But it is," returned she; "for Mrs. Long has just been here, and she told me all about it."</p>`,

          `<p>Mr. Bennet made no answer.</p>

<p>"Do you not want to know who has taken it?" cried his wife impatiently.</p>

<p>"You want to tell me, and I have no objection to hearing it."</p>

<p>This was invitation enough.</p>

<p>"Why, my dear, you must know, Mrs. Long says that Netherfield is taken by a young man of large fortune from the north of England."</p>`,

          `<p>The astonishment of the ladies was just what he wished; that of Mrs. Bennet perhaps surpassing the rest.</p>

<p>"If I can but see one of my daughters happily settled at Netherfield," said Mrs. Bennet to her husband, "and all the others equally well married, I shall have nothing to wish for."</p>

<p>In a few days Mr. Bennet returned Mr. Bingley's visit.</p>

<p>Mrs. Bennet had planned the courses that were to do credit to her housekeeping.</p>

<p>But the day came, and she had better have stayed at home.</p>`,

          `<p>Elizabeth Bennet had been obliged, by the scarcity of gentlemen, to sit down for two dances.</p>

<p>During part of that time Mr. Darcy had been standing near enough for her to hear a conversation between him and Mr. Bingley.</p>

<p>"Come, Darcy," said he, "I must have you dance."</p>

<p>"I certainly shall not. You know how I detest it, unless I am particularly acquainted with my partner."</p>

<p>Elizabeth remained with no very cordial feelings toward him.</p>`,

          `<p>She told the story, however, with great spirit among her friends.</p>

<p>For she had a lively, playful disposition which delighted in anything ridiculous.</p>

<p>The evening altogether passed off pleasantly.</p>

<p>The family returned home in good spirits.</p>

<p>Mrs. Bennet was perfectly satisfied.</p>`,

          `<p>The next morning brought with it a renewal of conversation about Mr. Bingley.</p>

<p>Jane listened with delight.</p>

<p>Elizabeth quietly observed the varied expressions of her mother's enthusiasm.</p>

<p>Mr. Bennet enjoyed the scene with his usual dry humour.</p>

<p>It was the beginning of many discussions yet to come.</p>`,

          `<p>Elizabeth soon found that she was regarded by her friend as deserving of every compliment.</p>

<p>Her quickness of observation amused him greatly.</p>

<p>They walked through the lanes and fields near Longbourn.</p>

<p>The air was fresh with the promise of spring.</p>

<p>Conversation moved easily between them.</p>`,

          `<p>Mr. Darcy meanwhile remained reserved.</p>

<p>His manners gave little encouragement to those around him.</p>

<p>Yet his eyes often turned toward Elizabeth.</p>

<p>There was in her expression a mixture of intelligence and independence.</p>

<p>It intrigued him more than he cared to admit.</p>`,

          `<p>The neighbourhood continued to speak of little else.</p>

<p>Every visit and every ball renewed the subject.</p>

<p>Friendships formed quickly.</p>

<p>Judgments were made just as quickly.</p>

<p>And thus the society of Hertfordshire was set in motion.</p>`,

          `<p>Elizabeth walked home slowly that evening.</p>

<p>The sky was fading to dusk.</p>

<p>Her thoughts moved between amusement and curiosity.</p>

<p>The world seemed suddenly wider than it had the week before.</p>

<p>And she wondered what new turns the coming days might bring.</p>`

        ]
      },

      {
        title: "Sherlock Holmes — Arthur Conan Doyle",
        pages: [

          `<p>To Sherlock Holmes she is always the woman.</p>

<p>I have seldom heard him mention her under any other name.</p>

<p>In his eyes she eclipses and predominates the whole of her sex.</p>

<p>It was not that he felt any emotion akin to love for Irene Adler.</p>

<p>All emotions were abhorrent to his cold and precise mind.</p>`,

          `<p>I had seen little of Holmes lately.</p>

<p>My marriage had drifted us away from each other.</p>

<p>My own complete happiness and the home-centered interests which rise around the man who first finds himself master of his own establishment were sufficient to absorb all my attention.</p>

<p>Holmes, who loathed every form of society with his whole Bohemian soul, remained in our lodgings in Baker Street.</p>

<p>There he continued his investigations.</p>`,

          `<p>One night it was on the twentieth of March that I was returning from a journey.</p>

<p>My way led me through Baker Street.</p>

<p>I saw the well-remembered door.</p>

<p>The sight stirred old memories.</p>

<p>I was seized with a keen desire to see Holmes again.</p>`,

          `<p>He was pacing the room swiftly.</p>

<p>His head was sunk upon his chest.</p>

<p>His hands were clasped behind him.</p>

<p>To those who knew him well, each mood was clearly indicated by his attitude.</p>

<p>His mind was evidently engaged in some keen examination.</p>`,

          `<p>"You have been in Afghanistan, I perceive."</p>

<p>These were the words that first astonished me.</p>

<p>Holmes delivered them calmly.</p>

<p>He had deduced it instantly.</p>

<p>The remark revealed the extraordinary powers of reasoning that would soon become famous.</p>`,

          `<p>Holmes smiled quietly at my astonishment.</p>

<p>"The train of reasoning was simple," he said.</p>

<p>"Observe the facts, eliminate the impossible, and whatever remains must be the truth."</p>

<p>His explanations were as remarkable as the conclusions.</p>

<p>I listened with growing admiration.</p>`,

          `<p>The case which he described that evening proved singular indeed.</p>

<p>A client of rank had come to him.</p>

<p>The matter involved a photograph.</p>

<p>The lady concerned was none other than Irene Adler.</p>

<p>Her intelligence matched Holmes's own.</p>`,

          `<p>For once, Holmes had met an adversary worthy of him.</p>

<p>The adventure required disguise and careful planning.</p>

<p>He entered the street in the character of a humble clergyman.</p>

<p>Even I scarcely recognized him.</p>

<p>Such was the completeness of his transformation.</p>`,

          `<p>The plan succeeded beyond expectation.</p>

<p>The hiding place of the photograph was discovered.</p>

<p>Yet the lady had been equally swift.</p>

<p>Before morning she had fled the country.</p>

<p>She left behind only a letter.</p>`,

          `<p>Holmes read it with quiet appreciation.</p>

<p>She had anticipated every move.</p>

<p>The photograph remained in her possession.</p>

<p>He folded the letter carefully.</p>

<p>From that day forward, Irene Adler was simply "the woman."</p>`

        ]
      },

      {
        title: "Moby-Dick — Herman Melville",
        pages: [

          `<p>Call me Ishmael.</p>

<p>Some years ago—never mind how long precisely—having little or no money in my purse, I thought I would sail about a little and see the watery part of the world.</p>

<p>It is a way I have of driving off the spleen and regulating the circulation.</p>

<p>Whenever I find myself growing grim about the mouth, I account it high time to get to sea.</p>

<p>This is my substitute for pistol and ball.</p>`,

          `<p>There now is your insular city of the Manhattoes.</p>

<p>Belted round by wharves as Indian isles by coral reefs.</p>

<p>Commerce surrounds it with her surf.</p>

<p>Right and left the streets take you waterward.</p>

<p>Its extreme downtown is the battery.</p>`,

          `<p>Look at the crowds of water-gazers there.</p>

<p>Stand on that promenade and observe the sea.</p>

<p>They linger in the quiet fascination of the horizon.</p>

<p>All seem drawn by the same impulse.</p>

<p>The ocean calls to them.</p>`,

          `<p>There is magic in it.</p>

<p>Let the most absent-minded of men be plunged in his deepest reveries.</p>

<p>Place him on his feet and set him going.</p>

<p>He will inevitably lead you to water.</p>

<p>The sea exerts a mysterious influence.</p>`,

          `<p>This is why sailors love their craft.</p>

<p>The endless horizon promises discovery.</p>

<p>The waves speak of distant lands.</p>

<p>The wind carries whispers of adventure.</p>

<p>And every voyage begins with a simple decision to depart.</p>`,

          `<p>It was with this feeling that I signed aboard a whaling ship.</p>

<p>The vessel was called the Pequod.</p>

<p>Her captain, Ahab, was already a legend among the crew.</p>

<p>Few had seen him clearly.</p>

<p>Fewer still understood him.</p>`,

          `<p>The ship left port under a pale winter sky.</p>

<p>The sea stretched endlessly before us.</p>

<p>The masts creaked softly in the wind.</p>

<p>The voyage had begun.</p>

<p>None of us yet knew its true purpose.</p>`,

          `<p>For Captain Ahab sought one thing alone.</p>

<p>A whale of terrible size and power.</p>

<p>White as a ghost upon the sea.</p>

<p>Its name was whispered among sailors.</p>

<p>Moby Dick.</p>`,

          `<p>The hunt would take us across oceans.</p>

<p>Storms would rise against us.</p>

<p>Strange islands would appear and vanish.</p>

<p>Yet Ahab's will never wavered.</p>

<p>The whale remained his single obsession.</p>`,

          `<p>Thus the Pequod sailed onward.</p>

<p>The crew watched the horizon day after day.</p>

<p>Some feared the journey.</p>

<p>Others welcomed the danger.</p>

<p>And always the white whale waited somewhere ahead.</p>`

        ]
      },

      {
        title: "A Tale of Two Cities — Charles Dickens",
        pages: [

          `<p>It was the best of times, it was the worst of times.</p>

<p>It was the age of wisdom, it was the age of foolishness.</p>

<p>It was the epoch of belief, it was the epoch of incredulity.</p>

<p>It was the season of Light, it was the season of Darkness.</p>

<p>It was the spring of hope, it was the winter of despair.</p>`,

          `<p>We had everything before us.</p>

<p>We had nothing before us.</p>

<p>We were all going direct to Heaven.</p>

<p>We were all going direct the other way.</p>

<p>In short, the period was so far like the present period.</p>`,

          `<p>There were a king with a large jaw and a queen with a plain face.</p>

<p>There were a king with a large jaw and a queen with a fair face on the throne of England.</p>

<p>In both countries it was clearer than crystal to the lords of the State preserves of loaves and fishes.</p>

<p>Things in general were settled forever.</p>

<p>Such was the certainty of the age.</p>`,

          `<p>The road lay quiet beneath the night sky.</p>

<p>A messenger rode quickly through the darkness.</p>

<p>The sound of hooves echoed along the hills.</p>

<p>The message he carried was urgent.</p>

<p>Lives would soon change because of it.</p>`,

          `<p>"Recalled to life."</p>

<p>The words carried strange meaning.</p>

<p>They spoke of a man long thought lost.</p>

<p>Years of imprisonment had erased him from memory.</p>

<p>Now he would return.</p>`,

          `<p>Paris stirred with restless energy.</p>

<p>The streets were crowded.</p>

<p>Voices rose in anger and hope.</p>

<p>The city felt the tremors of coming change.</p>

<p>History was moving quietly beneath the surface.</p>`,

          `<p>London meanwhile went about its business.</p>

<p>Carriages rolled through narrow streets.</p>

<p>Merchants called from their shops.</p>

<p>Gentlemen discussed politics in quiet rooms.</p>

<p>Few guessed how closely their fate was tied to France.</p>`,

          `<p>Among these lives stood Charles Darnay.</p>

<p>His past was hidden behind careful silence.</p>

<p>His future uncertain.</p>

<p>The tides of revolution would soon reach him.</p>

<p>And with them came danger.</p>`,

          `<p>Lucie Manette brought light wherever she went.</p>

<p>Her kindness touched everyone around her.</p>

<p>Even the troubled Doctor Manette found peace in her presence.</p>

<p>She became the center of their small world.</p>

<p>A symbol of hope in uncertain times.</p>`,

          `<p>Thus began a story that would cross two cities.</p>

<p>Love and sacrifice would shape its path.</p>

<p>The storm of revolution would test every character.</p>

<p>Yet through it all ran a quiet thread of redemption.</p>

<p>A reminder that even in darkness, compassion survives.</p>`

        ]

      }

    ];

    /* ---------------- RANDOM BOOK SELECTION ---------------- */

    function getRandomBooks(count) {
      const shuffled = [...books].sort(() => 0.5 - Math.random());
      return shuffled.slice(0, count);
    }

    const selectedBooks = getRandomBooks(4);
    let currentBookIndex = 0;
    let currentSpreadIndex = 0; // 0 = pages 0+1, 1 = pages 2+3, etc

    /* ---------------- ELEMENTS ---------------- */

    const leftText = document.getElementById("leftText");
    const rightText = document.getElementById("rightText");
    const nextBtn = document.getElementById("nextBtn");
    const backBtn = document.getElementById("backBtn");
    const pageForward = document.getElementById("pageForward");
    const pageBack = document.getElementById("pageBack");
    const finishSound = document.getElementById("finishSound");

    /* ---------------- INPUT BLOCKING + EXIT ---------------- */

    let inputBlocked = false;

    function blockAllInput() {
      inputBlocked = true;

      // disable mouse input
      nextBtn.style.pointerEvents = "none";
      backBtn.style.pointerEvents = "none";

      // also disable cursor feel (optional)
      nextBtn.style.cursor = "default";
      backBtn.style.cursor = "default";
    }

    function redirectToTraining() {
      window.location.href = "training.html";
    }

    function playSfx(audioEl) {
      if (!audioEl) return;
      audioEl.pause();
      audioEl.currentTime = 0;
      audioEl.play().catch(() => { });
    }

    /* ENTER key: instant exit (only if NOT blocked) */
    document.addEventListener("keydown", (e) => {
      if (inputBlocked) return;
      if (e.key === "Enter") {
        e.preventDefault();
        redirectToTraining();
      }
    }, { passive: false });

    /* ---------------- PAGE RENDER ---------------- */

    function renderPage() {
      const book = selectedBooks[currentBookIndex];
      const leftPage = book.pages[currentSpreadIndex * 2] || "";
      const rightPage = book.pages[currentSpreadIndex * 2 + 1] || "";

      leftText.innerHTML = leftPage;
      rightText.innerHTML = rightPage;

      backBtn.style.display =
        (currentSpreadIndex > 0 || currentBookIndex > 0)
          ? "block"
          : "none";

      /* ---- TIMER START (only for first forward visit) ---- */

      const key = currentBookIndex + "_" + currentSpreadIndex;

      if (!pageVisitedForward.has(key)) {
        pageVisitedForward.add(key);
        pageStartTime = performance.now();
      }
    }

    /* True when user is on the very last spread of the very last book */
    function isAtVeryEnd() {
      if (currentBookIndex !== selectedBooks.length - 1) return false;
      const book = selectedBooks[currentBookIndex];
      const maxSpread = Math.ceil(book.pages.length / 2) - 1;
      return currentSpreadIndex >= maxSpread;
    }

    function failReading() {
      blockAllInput();

      fade.style.transition = "opacity 0.25s ease";
      fade.style.opacity = "1";

      setTimeout(() => {
        window.location.href = "m_reading_fail.html";
      }, 250);
    }

    function finishAndExit() {
      blockAllInput();
      playSfx(finishSound);

      // redirect when sound finishes; fallback in case 'ended' doesn't fire
      const fallbackMs = 6000;
      const t = setTimeout(redirectToTraining, fallbackMs);

      finishSound.addEventListener("ended", () => {
        clearTimeout(t);
        redirectToTraining();
      }, { once: true });
    }

    /* ---------------- BUTTON VISUALS ---------------- */

    nextBtn.addEventListener("mousedown", () => {
      if (inputBlocked) return;
      nextBtn.src = "assets/NEXT_READING_PRESSED.webp";
    });
    nextBtn.addEventListener("mouseup", () => {
      if (inputBlocked) return;
      nextBtn.src = "assets/NEXT_READING.webp";
    });
    nextBtn.addEventListener("mouseleave", () => {
      if (inputBlocked) return;
      nextBtn.src = "assets/NEXT_READING.webp";
    });

    backBtn.addEventListener("mousedown", () => {
      if (inputBlocked) return;
      backBtn.src = "assets/BACK_READING_PRESSED.webp";
    });
    backBtn.addEventListener("mouseup", () => {
      if (inputBlocked) return;
      backBtn.src = "assets/BACK_READING.webp";
    });
    backBtn.addEventListener("mouseleave", () => {
      if (inputBlocked) return;
      backBtn.src = "assets/BACK_READING.webp";
    });

    /* ---------------- NAVIGATION ---------------- */

    nextBtn.addEventListener("click", () => {
      if (inputBlocked) return;

      const book = selectedBooks[currentBookIndex];
      const maxSpread = Math.ceil(book.pages.length / 2) - 1;

      const lastPage =
        currentBookIndex === selectedBooks.length - 1 &&
        currentSpreadIndex === maxSpread;

      /* ---- TIMER CHECK ---- */

      if (!lastPage) {
        const elapsed = (performance.now() - pageStartTime) / 1000;

        if (elapsed < 10) {
          failReading();
          return;
        }
      }

      /* ---- END GAME ---- */

      if (isAtVeryEnd()) {
        finishAndExit();
        return;
      }

      playSfx(pageForward);

      if (currentSpreadIndex < maxSpread) {
        currentSpreadIndex++;
      } else if (currentBookIndex < selectedBooks.length - 1) {
        currentBookIndex++;
        currentSpreadIndex = 0;
      }

      renderPage();
    });

    backBtn.addEventListener("click", () => {
      if (inputBlocked) return;

      playSfx(pageBack);

      if (currentSpreadIndex > 0) {
        currentSpreadIndex--;
      } else if (currentBookIndex > 0) {
        currentBookIndex--;
        const prevBook = selectedBooks[currentBookIndex];
        currentSpreadIndex = Math.ceil(prevBook.pages.length / 2) - 1;
      }

      renderPage();
    });

    /* ---------------- PAGE TIMER ---------------- */

    let pageStartTime = 0;
    let pageVisitedForward = new Set();

    /* ---------------- COUNTDOWN INTRO ---------------- */

    const countImg = document.getElementById("countImg");
    const countdown = document.getElementById("countdown");
    const waitSound = document.getElementById("waitSound");
    const goSound = document.getElementById("goSound");
    const fade = document.getElementById("fade");
    const game = document.getElementById("game");

    async function playCountdown() {
      const sequence = ["3.webp", "2.webp", "1.webp"];

      for (let img of sequence) {
        countImg.src = "assets/" + img;
        waitSound.currentTime = 0;
        waitSound.play().catch(() => { });
        await new Promise(r => setTimeout(r, 1000));
      }

      goSound.play().catch(() => { });
      countdown.style.display = "none";

      renderPage();

      requestAnimationFrame(() => {
        fade.style.opacity = "0";
        game.style.opacity = "1";
      });
    }

    window.onload = playCountdown;
  </script>

</body>

</html>
